<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القارئ الطبيب إبراهيم علي حجر | خادم القرآن الكريم</title>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- خطوط عربية راقية -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Reem+Kufi+Fun:wght@400;700&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1a1a;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            /* طبقات الخلفية الإسلامية */
            background-color: #0c2a2a;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(33, 147, 90, 0.1) 0%, transparent 50%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><path d="M50 10 L60 30 L82 32 L65 46 L70 68 L50 56 L30 68 L35 46 L18 32 L40 30 Z" fill="%23d4af37"/><path d="M50 0 L55 20 L75 20 L58 32 L63 52 L50 40 L37 52 L42 32 L25 20 L45 20 Z" fill="none" stroke="%23d4af37" stroke-width="0.5"/></svg>'),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.02"><circle cx="40" cy="40" r="30" fill="none" stroke="%23d4af37" stroke-width="1"/><circle cx="160" cy="160" r="50" fill="none" stroke="%23d4af37" stroke-width="0.7"/><path d="M20 100 Q50 80 80 100 T140 100" fill="none" stroke="%2321975a" stroke-width="0.8"/></svg>')
            ;
            background-size: cover, cover, cover, 180px, 220px;
            background-position: center;
            background-attachment: fixed;
        }

        /* وميض ذهبي ناعم على الأطراف */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .main-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            background: rgba(10, 30, 30, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 40px;
            padding: 45px 30px 35px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.6),
                0 0 80px rgba(33, 147, 90, 0.15),
                inset 0 1px 0 rgba(255,255,255,0.04);
            text-align: center;
            transition: all 0.4s ease;
        }

        /* زخرفة إطار حول البطاقة */
        .main-card::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px dashed rgba(212, 175, 55, 0.1);
            border-radius: 32px;
            pointer-events: none;
            animation: rotateGlow 20s linear infinite;
        }

        @keyframes rotateGlow {
            0% { border-color: rgba(212, 175, 55, 0.08); }
            50% { border-color: rgba(212, 175, 55, 0.2); }
            100% { border-color: rgba(212, 175, 55, 0.08); }
        }

        /* صورة البروفايل */
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 25px;
            position: relative;
            background: linear-gradient(135deg, #d4af37, #b8960c, #d4af37);
            padding: 4px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5), 0 10px 30px rgba(0,0,0,0.7);
            animation: floatGlow 3s ease-in-out infinite;
        }

        @keyframes floatGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.4), 0 10px 25px rgba(0,0,0,0.6); }
            50% { box-shadow: 0 0 55px rgba(212, 175, 55, 0.7), 0 15px 35px rgba(0,0,0,0.8); }
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0a1f1f;
            display: block;
        }

        /* زخرفة نجمية حول الصورة */
        .profile-pic::before {
            content: '۞';
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            color: #d4af37;
            opacity: 0.9;
            text-shadow: 0 0 20px rgba(212,175,55,0.7);
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.5; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
            50% { opacity: 1; text-shadow: 0 0 25px rgba(212,175,55,0.9); }
        }

        /* الاسم */
        .name-arabic {
            font-family: 'Amiri', 'Reem Kufi Fun', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: #f0e6c8;
            text-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            margin-bottom: 5px;
            line-height: 1.3;
            background: linear-gradient(180deg, #fff7e6 20%, #d4af37 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* المسمى */
        .title-badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 8px 24px;
            border-radius: 40px;
            margin: 10px 0 5px;
            font-size: 1rem;
            color: #e4c562;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            font-weight: 600;
        }

        .subtitle {
            color: #b3c9c9;
            margin: 15px 0 25px;
            font-size: 1.05rem;
            line-height: 1.8;
            font-weight: 300;
        }

        .subtitle i {
            color: #d4af37;
            margin: 0 4px;
            font-size: 0.8rem;
        }

        /* خط فاصل */
        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 20px auto 30px;
            position: relative;
        }
        .divider::after {
            content: '◈';
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4af37;
            font-size: 18px;
            background: #0a1f1f;
            padding: 0 10px;
        }

        /* أزرار التواصل */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 15px 24px;
            border-radius: 50px;
            text-decoration: none;
            color: #e0d5b8;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .social-btn i {
            font-size: 1.3rem;
            width: 28px;
            text-align: center;
            color: #d4af37;
            transition: all 0.3s;
        }

        .social-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: #d4af37;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.5), 0 0 25px rgba(212,175,55,0.25);
        }

        .social-btn:hover i {
            color: #ffd966;
            transform: scale(1.15);
        }

        /* زر الكارت الشخصي */
        .cart-section {
            margin: 30px 0 20px;
            position: relative;
        }

        .cart-label {
            color: #b3b3b3;
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0.8;
        }
        .cart-label i {
            color: #d4af37;
            font-size: 1rem;
        }

        .cart-thumb {
            display: inline-block;
            width: 120px;
            height: 160px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 30px rgba(212,175,55,0.2);
            cursor: pointer;
            transition: all 0.4s ease;
            background: #0e2a2a;
            position: relative;
        }

        .cart-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .cart-thumb:hover {
            border-color: #ffd966;
            box-shadow: 0 20px 45px rgba(0,0,0,0.7), 0 0 45px rgba(212,175,55,0.45);
            transform: translateY(-5px);
        }

        .cart-thumb:hover img {
            transform: scale(1.05);
        }

        .cart-thumb::after {
            content: '🔍';
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: #d4af37;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cart-thumb:hover::after {
            opacity: 1;
        }

        /* مودال تكبير الصورة */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-overlay img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 20px;
            border: 3px solid rgba(212, 175, 55, 0.7);
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), 0 0 80px rgba(212,175,55,0.35);
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active img {
            transform: scale(1);
        }

        .close-hint {
            position: absolute;
            top: 25px;
            right: 25px;
            color: #fff;
            font-size: 2rem;
            background: rgba(255,255,255,0.08);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .close-hint:hover {
            background: rgba(212,175,55,0.3);
            color: #ffd966;
        }

        /* تذييل */
        .footer-note {
            margin-top: 25px;
            color: #6b8b8b;
            font-size: 0.9rem;
            font-family: 'Amiri', serif;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
        .footer-note span {
            color: #d4af37;
            font-weight: 700;
        }

        /* إخفاء كامل للـ modal عندما لا يكون نشطاً */
        @media (max-width: 500px) {
            .main-card {
                padding: 35px 20px 30px;
                border-radius: 30px;
            }
            .name-arabic {
                font-size: 2rem;
            }
            .social-btn {
                padding: 13px 20px;
                font-size: 1rem;
            }
            .profile-pic {
                width: 130px;
                height: 130px;
            }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- صورة البروفايل الشخصية (استبدل src بصورتك) -->
        <div class="profile-pic">
            <img src="profile.jpg" alt="القارئ الطبيب إبراهيم علي حجر" onerror="this.style.display='none'; this.parentNode.style.background='linear-gradient(135deg, #1a3a2a, #0e2a2a)'; this.parentNode.innerHTML+='<span style=position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#d4af37;font-size:3rem;>﷽</span>';">
        </div>

        <!-- الاسم بخط مزخرف -->
        <h1 class="name-arabic">القارئ الطبيب<br>إبراهيم علي حجر</h1>

        <!-- مسمى خادم القرآن -->
        <div class="title-badge">
            <i class="fas fa-mosque"></i>  خادمُ القرآن الكريم
        </div>

        <!-- وصف إضافي -->
        <div class="subtitle">
            <i class="fas fa-satellite-dish"></i> قارئٌ بالقنوات الفضائية والتليفزيون المصري
        </div>

        <div class="divider"></div>

        <!-- أزرار التواصل الاجتماعي -->
        <div class="links-container">
            <!-- فيسبوك -->
            <a href="https://www.facebook.com/share/1Gpt4jU1Fx/" target="_blank" rel="noopener" class="social-btn">
                <i class="fab fa-facebook-f"></i> فيسبوك
            </a>

            <!-- واتساب -->
            <a href="https://wa.me/201004921550" target="_blank" rel="noopener" class="social-btn">
                <i class="fab fa-whatsapp"></i> واتساب
            </a>

            <!-- تيك توك -->
            <a href="https://www.tiktok.com/@ebrahim.hajar1" target="_blank" rel="noopener" class="social-btn">
                <i class="fab fa-tiktok"></i> تيك توك
            </a>

            <!-- إنستغرام -->
            <a href="https://www.instagram.com/ebrahim_hagar.10" target="_blank" rel="noopener" class="social-btn">
                <i class="fab fa-instagram"></i> إنستغرام
            </a>

            <!-- رقم الهاتف -->
            <a href="tel:01004921550" class="social-btn">
                <i class="fas fa-phone-alt"></i> اتصل بنا
            </a>
        </div>

        <div class="divider"></div>

        <!-- قسم الكارت الشخصي -->
        <div class="cart-section">
            <div class="cart-label">
                <i class="fas fa-id-card"></i> الكارت الشخصي
            </div>
            <!-- الصورة المصغرة، عند الضغط تكبر -->
            <div class="cart-thumb" onclick="openModal()" title="اضغط للتكبير">
                <img src="cart.jpg" alt="الكارت الشخصي - القارئ الطبيب إبراهيم علي حجر" onerror="this.style.display='none'; this.parentNode.innerHTML+='<div style=color:#d4af37;padding:40px;text-align:center;>↗ اضغط لرؤية الكارت</div>';">
            </div>
        </div>

        <!-- تذييل بآية قرآنية أو دعاء -->
        <div class="footer-note">
            <span>﴿</span> وَرَتِّلِ الْقُرْآنَ تَرْتِيلًا <span>﴾</span><br>
            <span style="font-size:0.7rem;">اللهم اجعله شفيعاً لنا يوم القيامة</span>
        </div>
    </div>

    <!-- المودال (النافذة المنبثقة) لتكبير صورة الكارت -->
    <div class="modal-overlay" id="modal" onclick="closeModal()">
        <span class="close-hint" onclick="closeModal()">&times;</span>
        <img src="cart.jpg" alt="الكارت الشخصي مكبر" id="modalImg" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22400%22><rect width=%22300%22 height=%22400%22 fill=%22%230e2a2a%22/><text x=%22150%22 y=%22200%22 text-anchor=%22middle%22 fill=%22%23d4af37%22 font-size=%2220%22>الرجاء إضافة صورة cart.jpg</text></svg>';">
    </div>

    <script>
        // وظائف فتح وإغلاق المودال
        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden'; // منع التمرير خلف المودال
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = ''; // إعادة التمرير
        }

        // إغلاق المودال بزر Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // منع إغلاق المودال عند الضغط على الصورة نفسها (الضغط على الخلفية فقط يغلقه)
        document.getElementById('modalImg').addEventListener('click', function(e) {
            e.stopPropagation();
        });
    </script>

</body>
</html>
